<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>18橋牌隊制賽網站</title>
</head>
<body>
  <h1>橋牌隊制賽網站</h1>
  <input type="text" id="numberInput" placeholder="請輸入合約線位">
  <select id="mySelect">
    <option value="">--請選擇--</option>
    <option value="a">club</option>
    <option value="b">diamond</option>
    <option value="c">heart</option>
    <option value="d">spade</option>
    <option value="e">NT</option>
  </select>
  身價 <input type="checkbox" id="bodyprice"><br>
  賭背 <input type="text" id="doubles" placeholder="請輸入doubles"><br>
  結果
  <select id="resultMD">
    <option value="">--請選擇--</option>
    <option value="M">make</option>
    <option value="D">down</option>
  </select><br>
  <input type="text" id="Gresult" placeholder="結果是多少">
  <br><br>
  <button onclick="calculate()">計算分數</button>

  <p id="output2"></p>
  <table border="1" id="table1">
  <tr>
    <th>合約和結果</th>
    <th>分數</th>
  </tr>
  <tr>
    <td>4♥+1</td>
    <td>650</td>
  </tr>
  </table>
  <!-- 🔥 重點：module -->
  <script type="module">
    import {
      countroundP,
      countprizepoints,
      countextra,
      countlosspoint,
      counttotalpoints
    } from './score.js';
  import{
    scoreToIMP,
    impToVP
  }from './ToIMP.js';
    import{
    showNumber
  }from './Show.js';
    import{
    initialTable
  }from './TableFunctions.js';
    
    function calculate() {
      let input = parseInt(document.getElementById("numberInput").value) || 0;
      let suit = document.getElementById("mySelect").value;
      let isVul = document.getElementById("bodyprice").checked;
      let doubles = parseInt(document.getElementById("doubles").value) || 0;
      let resultType = document.getElementById("resultMD").value;
      let result = parseInt(document.getElementById("Gresult").value) || 0;
      if (!suit || input <= 0) {
        document.getElementById("output2").innerText = "請輸入正確合約";
        return;
      }
      if (!resultType) {
  document.getElementById("output2").innerText = "請選擇結果類型";
  return; 
}
      let a=counttotalpoints(input,suit,doubles,resultType,result,isVul);
      let b=scoreToIMP(a);
      let c=showNumber(input,suit,doubles,resultType,result,isVul);
document.getElementById("output2").innerText = `${c}為${a}分，${b}imp`;
      let table = document.getElementById("table1");
addRow(c, a, table);

    }
function addRow(CandR, score,tableID) {
  let table =tableID;
  let row = table.insertRow();
  row.insertCell(0).innerText = CandR;
  row.insertCell(1).innerText = score;
}


    // 讓 HTML onclick 可以用
    window.calculate = calculate;
    
  </script>
</body>

</html>
